version: "3.8"

services:
  victorialogs:
    image: victoriametrics/victoria-logs:v1.49.0
    container_name: vl-proxy-test
    ports:
      - "9428:9428"
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:9428"
    volumes:
      - vl-data:/vlogs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  loki-vl-proxy:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:1.16.0
    container_name: loki-vl-proxy
    ports:
      - "3100:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-log-level=debug"
      - "-cache-ttl=30s"
    depends_on:
      victorialogs:
        condition: service_healthy

  loki:
    image: grafana/loki:3.4.2
    container_name: loki-direct
    ports:
      - "3200:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana-proxy-test
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./test/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - loki-vl-proxy

volumes:
  vl-data:
