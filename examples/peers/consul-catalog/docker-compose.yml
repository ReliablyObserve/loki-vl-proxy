# loki-vl-proxy — peer fleet with Consul catalog discovery
#
# Consul runs in dev mode (single node, no persistence) and acts as the service
# registry.  A one-shot setup service registers all three proxies with health
# checks.  Each proxy uses -peer-discovery=http pointed at the Consul catalog
# API with ?passing=true so only healthy instances appear in the peer list.
#
# Usage:
#   docker compose up -d
#   open http://localhost:8500   (Consul UI)
#   curl http://localhost:3100/_cache/peers
#
# The consul-setup service exits after registering services — this is expected.

services:

  # ── VictoriaLogs ───────────────────────────────────────────────────────────
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    command:
      - -retentionPeriod=7d
      - -storageDataPath=/vlogs
    volumes:
      - vlogs-data:/vlogs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Consul server ──────────────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:latest
    ports:
      - "8500:8500"
    command:
      - agent
      - -dev
      - -client=0.0.0.0
      - -log-level=warn
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── consul-setup — registers proxy-a/b/c with health checks ───────────────
  consul-setup:
    image: curlimages/curl:latest
    depends_on:
      consul:
        condition: service_healthy
    volumes:
      - ./consul-register.sh:/consul-register.sh:ro
    entrypoint: ["/bin/sh", "/consul-register.sh"]
    restart: "no"

  # ── proxy-a ────────────────────────────────────────────────────────────────
  proxy-a:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    ports:
      - "3100:3100"
    command:
      - -backend=http://victorialogs:9428
      - -label-style=underscores
      - -metadata-field-mode=translated
      - -emit-structured-metadata=true
      - -patterns-enabled=true
      - -cache-ttl=60s
      - -cache-max=5000
      # Peer cache — Consul catalog discovery
      # The Consul catalog API returns a JSON array of service instances.
      # ?passing=true ensures only healthy proxies are included in the peer list.
      - -peer-self=proxy-a:3100
      - -peer-discovery=http
      - -peer-http-url=http://consul:8500/v1/health/service/loki-vl-proxy?passing=true
      - -peer-auth-token=fleet-secret
      - -log-level=info
    depends_on:
      victorialogs:
        condition: service_healthy
      consul-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── proxy-b ────────────────────────────────────────────────────────────────
  proxy-b:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    ports:
      - "3101:3100"
    command:
      - -backend=http://victorialogs:9428
      - -label-style=underscores
      - -metadata-field-mode=translated
      - -emit-structured-metadata=true
      - -patterns-enabled=true
      - -cache-ttl=60s
      - -cache-max=5000
      - -peer-self=proxy-b:3100
      - -peer-discovery=http
      - -peer-http-url=http://consul:8500/v1/health/service/loki-vl-proxy?passing=true
      - -peer-auth-token=fleet-secret
      - -log-level=info
    depends_on:
      victorialogs:
        condition: service_healthy
      consul-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── proxy-c ────────────────────────────────────────────────────────────────
  proxy-c:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    ports:
      - "3102:3100"
    command:
      - -backend=http://victorialogs:9428
      - -label-style=underscores
      - -metadata-field-mode=translated
      - -emit-structured-metadata=true
      - -patterns-enabled=true
      - -cache-ttl=60s
      - -cache-max=5000
      - -peer-self=proxy-c:3100
      - -peer-discovery=http
      - -peer-http-url=http://consul:8500/v1/health/service/loki-vl-proxy?passing=true
      - -peer-auth-token=fleet-secret
      - -log-level=info
    depends_on:
      victorialogs:
        condition: service_healthy
      consul-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vlogs-data:
