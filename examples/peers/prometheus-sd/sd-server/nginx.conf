worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout combined;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;

        # /peers — Prometheus HTTP SD JSON endpoint.
        # Cache-Control hoisted to the server block (was inside `location =
        # /peers`). nginx's `add_header` inheritance is "all-or-nothing":
        # a `location` block that uses add_header WIPES OUT any server-block
        # add_headers for that location. Server-block placement makes the
        # header take effect for every endpoint here AND the /health probe,
        # which is correct (no-store is harmless for a 200/"ok" response).
        # Resolves Semgrep generic.nginx.security.header-redefinition.
        add_header Cache-Control "no-store" always;

        # /peers — Prometheus HTTP SD JSON endpoint
        location = /peers {
            default_type application/json;
            try_files /peers.json =404;
        }

        # /health — simple liveness probe
        location = /health {
            return 200 "ok\n";
            default_type text/plain;
        }
    }
}
