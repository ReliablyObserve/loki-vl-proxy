# loki-vl-proxy — peer fleet with Prometheus HTTP SD discovery
#
# An nginx container (sd-server) serves a static JSON file in Prometheus HTTP
# Service Discovery format.  Each proxy uses -peer-discovery=http pointed at
# sd-server, which the proxy parses as a Prometheus HTTP SD response.
#
# This is the simplest possible external-discovery setup: edit peers.json and
# the change is picked up on the next proxy poll without any restart.
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8080/peers          (inspect the SD endpoint)
#   curl http://localhost:3100/_cache/peers   (peer list seen by proxy-a)

services:

  # ── VictoriaLogs ───────────────────────────────────────────────────────────
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    command:
      - -retentionPeriod=7d
      - -storageDataPath=/vlogs
    volumes:
      - vlogs-data:/vlogs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── sd-server — nginx serving the static peer list ─────────────────────────
  sd-server:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./sd-server/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sd-server/peers.json:/usr/share/nginx/html/peers.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/peers"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── proxy-a ────────────────────────────────────────────────────────────────
  proxy-a:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    ports:
      - "3100:3100"
    command:
      - -backend=http://victorialogs:9428
      - -label-style=underscores
      - -metadata-field-mode=translated
      - -emit-structured-metadata=true
      - -patterns-enabled=true
      - -cache-ttl=60s
      - -cache-max=5000
      # Peer cache — Prometheus HTTP SD discovery
      # The proxy parses the JSON as a Prometheus HTTP SD target group list.
      # Each entry in "targets" becomes a peer address.
      - -peer-self=proxy-a:3100
      - -peer-discovery=http
      - -peer-http-url=http://sd-server:8080/peers
      - -peer-auth-token=fleet-secret
      - -log-level=info
    depends_on:
      victorialogs:
        condition: service_healthy
      sd-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── proxy-b ────────────────────────────────────────────────────────────────
  proxy-b:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    ports:
      - "3101:3100"
    command:
      - -backend=http://victorialogs:9428
      - -label-style=underscores
      - -metadata-field-mode=translated
      - -emit-structured-metadata=true
      - -patterns-enabled=true
      - -cache-ttl=60s
      - -cache-max=5000
      - -peer-self=proxy-b:3100
      - -peer-discovery=http
      - -peer-http-url=http://sd-server:8080/peers
      - -peer-auth-token=fleet-secret
      - -log-level=info
    depends_on:
      victorialogs:
        condition: service_healthy
      sd-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── proxy-c ────────────────────────────────────────────────────────────────
  proxy-c:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    ports:
      - "3102:3100"
    command:
      - -backend=http://victorialogs:9428
      - -label-style=underscores
      - -metadata-field-mode=translated
      - -emit-structured-metadata=true
      - -patterns-enabled=true
      - -cache-ttl=60s
      - -cache-max=5000
      - -peer-self=proxy-c:3100
      - -peer-discovery=http
      - -peer-http-url=http://sd-server:8080/peers
      - -peer-auth-token=fleet-secret
      - -log-level=info
    depends_on:
      victorialogs:
        condition: service_healthy
      sd-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vlogs-data:
