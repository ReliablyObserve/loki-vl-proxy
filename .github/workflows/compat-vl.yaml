name: VictoriaLogs Compatibility

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "docs/observability.md"
      - "charts/loki-vl-proxy/Chart.yaml"
      - "README.md"
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1"

permissions:
  contents: read

jobs:
  vl-matrix-source:
    runs-on: ubuntu-latest
    outputs:
      vl_versions: ${{ steps.matrix.outputs.vl_versions }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: echo "vl_versions=$(jq -c '.stack.victorialogs.matrix_versions' test/e2e-compat/compatibility-matrix.json)" >> "$GITHUB_OUTPUT"

  vl-pinned:
    if: github.event_name != 'schedule'
    needs: vl-matrix-source
    runs-on: ubuntu-latest
    env:
      LOKI_IMAGE: grafana/loki:3.7.1
      VICTORIALOGS_IMAGE: victoriametrics/victoria-logs:v1.49.0
      GRAFANA_IMAGE: grafana/grafana:12.4.2
      PROXY_IMAGE: loki-vl-proxy:compat-vl
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.PROXY_IMAGE }}
          load: true
          cache-from: type=gha,scope=compat-proxy
          cache-to: type=gha,mode=max,scope=compat-proxy
      - name: Start pinned stack
        working-directory: test/e2e-compat
        run: |
          docker compose up -d --no-build
          ../../scripts/ci/wait_e2e_stack.sh 180
      - name: Run VictoriaLogs compatibility score
        run: go test -v -tags=e2e -run '^TestVLTrackScore$' ./test/e2e-compat/
      - name: Tear down pinned stack
        if: always()
        working-directory: test/e2e-compat
        run: docker compose down -v

  vl-matrix:
    if: github.event_name == 'schedule'
    needs: vl-matrix-source
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vl_version: ${{ fromJson(needs.vl-matrix-source.outputs.vl_versions) }}
    env:
      LOKI_IMAGE: grafana/loki:3.7.1
      GRAFANA_IMAGE: grafana/grafana:12.4.2
      PROXY_IMAGE: loki-vl-proxy:compat-vl
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.PROXY_IMAGE }}
          load: true
          cache-from: type=gha,scope=compat-proxy
          cache-to: type=gha,mode=max,scope=compat-proxy
      - name: Start matrix stack
        working-directory: test/e2e-compat
        env:
          VICTORIALOGS_IMAGE: victoriametrics/victoria-logs:${{ matrix.vl_version }}
        run: |
          docker compose up -d --no-build
          ../../scripts/ci/wait_e2e_stack.sh 180
      - name: Run VictoriaLogs compatibility score
        env:
          VICTORIALOGS_IMAGE: victoriametrics/victoria-logs:${{ matrix.vl_version }}
        run: go test -v -tags=e2e -run '^TestVLTrackScore$' ./test/e2e-compat/
      - name: Tear down matrix stack
        if: always()
        working-directory: test/e2e-compat
        env:
          VICTORIALOGS_IMAGE: victoriametrics/victoria-logs:${{ matrix.vl_version }}
        run: docker compose down -v
