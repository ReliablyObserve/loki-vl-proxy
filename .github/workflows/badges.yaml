name: Update Badges

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  badge-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Count tests and coverage
        run: |
          echo "=== Test Count ==="
          TESTS=$(go test ./... -count=1 -json 2>/dev/null | jq -r 'select(.Action=="pass" and .Test != null) | .Test' | wc -l)
          echo "Tests passed: ${TESTS}"

          echo ""
          echo "=== Coverage ==="
          go test ./... -coverprofile=coverage.out -count=1 2>/dev/null
          go tool cover -func=coverage.out | tail -1

          echo ""
          echo "=== Summary ==="
          echo "Update README badge manually: tests-${TESTS}%20passed"
