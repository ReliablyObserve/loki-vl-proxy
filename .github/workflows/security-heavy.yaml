name: Security Heavy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  image-and-sbom:
    name: Heavy / image and sbom
    runs-on: ubuntu-latest
    env:
      PROXY_IMAGE: loki-vl-proxy:security-heavy
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.PROXY_IMAGE }}
          load: true
          cache-from: type=gha,scope=security-heavy-proxy
          cache-to: type=gha,mode=max,scope=security-heavy-proxy

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.PROXY_IMAGE }}
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln,misconfig,secret

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: always()
        with:
          sarif_file: trivy-image.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.PROXY_IMAGE }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload image security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: image-security
          path: |
            trivy-image.sarif
            sbom.spdx.json

  semgrep:
    name: Heavy / semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Semgrep scan
        run: |
          pip install semgrep==1.161.0
          semgrep scan \
            --config p/default \
            --config p/dockerfile \
            --config p/github-actions \
            --config p/golang \
            --config p/owasp-top-ten \
            --config p/secrets \
            --exclude-rule go.lang.security.audit.xss.no-direct-write-to-responsewriter.no-direct-write-to-responsewriter \
            --exclude-rule go.lang.security.audit.xss.no-fprintf-to-responsewriter.no-fprintf-to-responsewriter \
            --exclude-rule go.lang.security.audit.xss.no-io-writestring-to-responsewriter.no-io-writestring-to-responsewriter \
            --exclude-rule javascript.lang.security.detect-insecure-websocket.detect-insecure-websocket \
            --exclude-rule go.gorilla.security.audit.websocket-missing-origin-check.websocket-missing-origin-check \
            --exclude-rule go.lang.security.audit.xss.import-text-template.import-text-template \
            --exclude-rule go.lang.security.audit.crypto.math_random.math-random-used \
            --exclude-rule yaml.docker-compose.security.writable-filesystem-service.writable-filesystem-service \
            --exclude-rule yaml.docker-compose.security.no-new-privileges.no-new-privileges \
            --exclude-rule problem-based-packs.insecure-transport.go-stdlib.bypass-tls-verification.bypass-tls-verification \
            --sarif \
            --output semgrep.sarif \
            --error

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  fuzz:
    name: Heavy / fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Longer fuzzing
        run: |
          go test ./internal/proxy -run '^$' -fuzz=FuzzNormalizeMetadataPairsFromJSON -fuzztime=2m
          go test ./internal/proxy -run '^$' -fuzz=FuzzMergeLokiQueryResponsesStructuredMetadataContract -fuzztime=2m
          go test ./internal/proxy -run '^$' -fuzz=FuzzExtractLogPatterns -fuzztime=2m

  dast:
    name: Heavy / dast
    runs-on: ubuntu-latest
    env:
      PROXY_IMAGE: loki-vl-proxy:security-heavy
      PROXY_BASE_URL: http://127.0.0.1:13100
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7
        with:
          go-version: "1.26.5"
          cache: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.PROXY_IMAGE }}
          load: true
          cache-from: type=gha,scope=security-heavy-proxy
          cache-to: type=gha,mode=max,scope=security-heavy-proxy

      - name: Start e2e stack
        working-directory: test/e2e-compat
        run: |
          docker compose up -d --no-build
          ../../scripts/ci/wait_e2e_stack.sh 180

      - name: Seed smoke data
        run: go test -v -tags=e2e -run '^TestSetup_IngestLogs$' ./test/e2e-compat/

      - name: ZAP active scan
        run: ./scripts/ci/run_zap_scan.sh active

      - name: Curated Nuclei scan
        run: ./scripts/ci/run_nuclei_scan.sh

      - name: Upload heavy dast artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: heavy-dast
          path: |
            security-reports/zap
            security-reports/nuclei

      - name: Tear down e2e stack
        if: always()
        working-directory: test/e2e-compat
        run: docker compose down -v
