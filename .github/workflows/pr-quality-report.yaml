name: PR Quality Report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  head-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Collect PR quality snapshot
        run: bash scripts/ci/collect_quality_metrics.sh /tmp/pr-head-quality.json

      - name: Upload PR quality snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pr-head-quality
          path: /tmp/pr-head-quality.json

  base-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Restore cached base quality snapshot
        id: base-quality-cache
        uses: actions/cache@v4
        with:
          path: .cache/pr-quality/base-quality.json
          key: ${{ runner.os }}-pr-quality-base-${{ github.event.pull_request.base.sha }}

      - name: Collect base quality snapshot
        if: steps.base-quality-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/pr-quality
          bash scripts/ci/collect_quality_metrics.sh .cache/pr-quality/base-quality.json

      - name: Upload base quality snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pr-base-quality
          path: .cache/pr-quality/base-quality.json

  report:
    runs-on: ubuntu-latest
    needs: [head-snapshot, base-snapshot]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download base quality snapshot
        uses: actions/download-artifact@v4
        with:
          name: pr-base-quality
          path: /tmp/pr-quality

      - name: Download PR quality snapshot
        uses: actions/download-artifact@v4
        with:
          name: pr-head-quality
          path: /tmp/pr-quality

      - name: Render report summary
        run: |
          bash scripts/ci/render_pr_report.sh \
            /tmp/pr-quality/base-quality.json \
            /tmp/pr-quality/pr-head-quality.json \
            /tmp/pr-quality/pr-quality-report.md

          cat /tmp/pr-quality/pr-quality-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce quality gate
        run: |
          python3 scripts/ci/check_quality_gate.py \
            /tmp/pr-quality/base-quality.json \
            /tmp/pr-quality/pr-head-quality.json

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-quality-report
          path: |
            /tmp/pr-quality/base-quality.json
            /tmp/pr-quality/pr-head-quality.json
            /tmp/pr-quality/pr-quality-report.md

      - name: Publish sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const body = fs.readFileSync('/tmp/pr-quality/pr-quality-report.md', 'utf8');
            const marker = '<!-- pr-quality-report -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
