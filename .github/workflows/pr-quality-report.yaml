name: PR Quality Report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      PROXY_IMAGE: loki-vl-proxy:pr-quality
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 2

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7
        with:
          go-version: "1.26.5"
          cache: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.PROXY_IMAGE }}
          load: true
          cache-from: type=gha,scope=pr-quality-proxy
          cache-to: type=gha,mode=max,scope=pr-quality-proxy

      - name: Detect perf-sensitive scope
        id: perf-scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "${BASE_SHA}"
          FILES="$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}")"
          RUN_PERF=false
          if echo "$FILES" | grep -Eq '^(cmd/|internal/|pkg/|go\.mod|go\.sum|Dockerfile|test/e2e-compat/|scripts/ci/(collect_quality_metrics\.sh|check_quality_gate\.py|render_pr_report\.sh)|\.github/workflows/pr-quality-report\.yaml)'; then
            RUN_PERF=true
          fi
          echo "run_perf=${RUN_PERF}" >> "$GITHUB_OUTPUT"
          {
            echo "### PR quality scope"
            if [ "${RUN_PERF}" = "true" ]; then
              echo "- perf smoke: enabled"
            else
              echo "- perf smoke: skipped (no perf-sensitive files changed)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore cached base quality snapshot
        id: base-quality-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: .cache/pr-quality/base-quality.json
          key: ${{ runner.os }}-pr-quality-base-${{ github.event.pull_request.base.sha }}-perf-${{ steps.perf-scope.outputs.run_perf }}-schema-v3

      - name: Collect base and PR quality snapshots
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          WORKSPACE: ${{ github.workspace }}
          PROXY_IMAGE: ${{ env.PROXY_IMAGE }}
          QUALITY_SKIP_PERF: ${{ steps.perf-scope.outputs.run_perf == 'true' && '0' || '1' }}
        run: |
          set -euo pipefail

          mkdir -p .cache/pr-quality
          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "${BASE_SHA}"

          bash "$WORKSPACE/scripts/ci/collect_quality_metrics.sh" /tmp/pr-head-quality.json

          if [ -f .cache/pr-quality/base-quality.json ]; then
            cp .cache/pr-quality/base-quality.json /tmp/pr-base-quality.json
          else
            git worktree add /tmp/loki-vl-proxy-base "$BASE_SHA"
            (
              cd /tmp/loki-vl-proxy-base
              bash "$WORKSPACE/scripts/ci/collect_quality_metrics.sh" /tmp/pr-base-quality.json
            )
            cp /tmp/pr-base-quality.json .cache/pr-quality/base-quality.json
          fi

          bash "$WORKSPACE/scripts/ci/render_pr_report.sh" \
            /tmp/pr-base-quality.json \
            /tmp/pr-head-quality.json \
            /tmp/pr-quality-report.md

          cat /tmp/pr-quality-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce quality gate
        run: |
          python3 scripts/ci/check_quality_gate.py \
            /tmp/pr-base-quality.json \
            /tmp/pr-head-quality.json

      - name: Upload quality artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: pr-quality-report
          path: |
            /tmp/pr-base-quality.json
            /tmp/pr-head-quality.json
            /tmp/pr-quality-report.md

      - name: Publish sticky PR comment
        # Fork PRs run with a read-only token — skip silently rather than failing.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const body = fs.readFileSync('/tmp/pr-quality-report.md', 'utf8');
            const marker = '<!-- pr-quality-report -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Clean up base worktree
        if: always()
        run: git worktree remove --force /tmp/loki-vl-proxy-base || true
