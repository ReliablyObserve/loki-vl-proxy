name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.25.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Run tests with race detector
        run: go test ./... -count=1 -race

  compat-check:
    runs-on: ubuntu-latest
    outputs:
      compat_pct: ${{ steps.compat.outputs.COMPAT_PCT }}
      compat_detail: ${{ steps.compat.outputs.COMPAT_DETAIL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Start e2e stack
        working-directory: test/e2e-compat
        run: |
          docker compose up -d --build
          sleep 20
          docker compose ps

      - name: Run compatibility tests
        id: compat
        run: |
          set -o pipefail
          OUTPUT=$(go test -v -tags=e2e -timeout=120s ./test/e2e-compat/ 2>&1) || true
          echo "$OUTPUT"
          SCORES=$(echo "$OUTPUT" | grep -oP 'Score: \K\d+/\d+ \(\d+\.\d+%\)' || true)
          TOTAL_PASS=0
          TOTAL_ALL=0
          while IFS= read -r line; do
            PASS=$(echo "$line" | grep -oP '^\d+')
            ALL=$(echo "$line" | grep -oP '/\K\d+')
            TOTAL_PASS=$((TOTAL_PASS + PASS))
            TOTAL_ALL=$((TOTAL_ALL + ALL))
          done <<< "$SCORES"
          if [ "$TOTAL_ALL" -gt 0 ]; then
            PCT=$(echo "scale=1; $TOTAL_PASS * 100 / $TOTAL_ALL" | bc)
            echo "COMPAT_PCT=${PCT}%" >> "$GITHUB_OUTPUT"
            echo "COMPAT_DETAIL=${TOTAL_PASS}/${TOTAL_ALL}" >> "$GITHUB_OUTPUT"
          else
            echo "COMPAT_PCT=N/A" >> "$GITHUB_OUTPUT"
            echo "COMPAT_DETAIL=no e2e tests ran" >> "$GITHUB_OUTPUT"
          fi

      - name: Tear down e2e stack
        if: always()
        working-directory: test/e2e-compat
        run: docker compose down -v

  release:
    runs-on: ubuntu-latest
    needs: [test, compat-check]
    if: always() && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Extract version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          # Find previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -vx "$TAG" | head -1)
          echo "PREV_TAG=${PREV_TAG:-}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PREV_TAG="${{ steps.version.outputs.PREV_TAG }}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            echo "## What's Changed in v${VERSION}"
            echo ""

            # Features
            FEATS=$(git log "$RANGE" --pretty=format:'- %s' --grep='^feat' 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:'- %s' --grep='^fix' 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Tests
            TESTS=$(git log "$RANGE" --pretty=format:'- %s' --grep='^test' 2>/dev/null || true)
            if [ -n "$TESTS" ]; then
              echo "### Tests"
              echo "$TESTS"
              echo ""
            fi

            # Docs
            DOCS=$(git log "$RANGE" --pretty=format:'- %s' --grep='^doc' 2>/dev/null || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            # Other commits
            OTHER=$(git log "$RANGE" --pretty=format:'- %s' --grep='^feat' --grep='^fix' --grep='^test' --grep='^doc' --invert-grep 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            # Stats
            echo "### Stats"
            COMMITS=$(git rev-list --count "$RANGE" 2>/dev/null || echo "0")
            FILES=$(git diff --shortstat "$PREV_TAG" HEAD 2>/dev/null | sed 's/^ //' || echo "")
            echo "- ${COMMITS} commits since ${PREV_TAG:-initial}"
            if [ -n "$FILES" ]; then
              echo "- ${FILES}"
            fi
            echo ""

            # Test count and coverage
            TEST_COUNT=$(go test ./... -count=1 -json 2>/dev/null | jq -r 'select(.Action=="pass" and .Test != null) | .Test' | wc -l | tr -d ' ' || echo "0")
            go test ./... -coverprofile=coverage.out -count=1 2>/dev/null || true
            COV=$(go tool cover -func=coverage.out 2>/dev/null | tail -1 | awk '{print $NF}' || echo "N/A")
            echo "- ${TEST_COUNT} tests (${COV} coverage)"

            # Compatibility score from e2e tests
            COMPAT_PCT="${{ needs.compat-check.outputs.compat_pct }}"
            COMPAT_DETAIL="${{ needs.compat-check.outputs.compat_detail }}"
            if [ -n "$COMPAT_PCT" ] && [ "$COMPAT_PCT" != "N/A" ]; then
              echo "- Loki API compatibility: ${COMPAT_DETAIL} (${COMPAT_PCT})"
            fi

            echo ""
            echo "### Installation"
            echo ""
            echo '```bash'
            echo "# Docker"
            echo "docker pull ghcr.io/szibis/loki-vl-proxy:${VERSION}"
            echo ""
            echo "# Helm"
            echo "helm install loki-vl-proxy ./charts/loki-vl-proxy \\"
            echo "  --set image.tag=${VERSION} \\"
            echo "  --set extraArgs.backend=http://victorialogs:9428"
            echo ""
            echo "# Binary"
            echo "# Download from release assets below"
            echo ""
            echo "# Helm chart package"
            echo "# Download loki-vl-proxy-${VERSION}.tgz from release assets below"
            echo '```'

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist

          for GOOS_GOARCH in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${GOOS_GOARCH%/*}"
            GOARCH="${GOOS_GOARCH#*/}"
            OUT="dist/loki-vl-proxy-${GOOS}-${GOARCH}"
            echo "Building ${OUT}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$OUT" ./cmd/proxy
          done

          # Create checksums
          cd dist && sha256sum loki-vl-proxy-* > checksums.txt

      - name: Package Helm chart
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          helm package charts/loki-vl-proxy \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/loki-vl-proxy:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            dist/loki-vl-proxy-*
            dist/checksums.txt
            dist/loki-vl-proxy-*.tgz
