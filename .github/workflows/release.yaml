name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.26.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -vx "$TAG" | head -1 || true)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Render release notes
        id: release_notes
        run: |
          set -euo pipefail
          chmod +x scripts/ci/extract_changelog_section.sh
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          if scripts/ci/extract_changelog_section.sh "${VERSION}" CHANGELOG.md > "$NOTES_FILE" 2>/dev/null; then
            :
          else
            PREV_TAG="${{ steps.version.outputs.prev_tag }}"
            {
              echo "## [${VERSION}]"
              echo ""
              echo "### Changes"
              echo ""
              if [ -n "$PREV_TAG" ]; then
                git log "${PREV_TAG}..${{ steps.version.outputs.tag }}" --pretty=format:'- %s'
              else
                git log "${{ steps.version.outputs.tag }}" --pretty=format:'- %s'
              fi
            } > "$NOTES_FILE"
          fi
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          for GOOS_GOARCH in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${GOOS_GOARCH%/*}"
            GOARCH="${GOOS_GOARCH#*/}"
            OUT="dist/loki-vl-proxy-${GOOS}-${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$OUT" ./cmd/proxy
          done
          cd dist && sha256sum loki-vl-proxy-* > checksums.txt

      - name: Package Helm chart
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          helm package charts/loki-vl-proxy \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist

      - name: Login Helm to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/loki-vl-proxy:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Publish Helm chart to GHCR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          helm push "dist/loki-vl-proxy-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          files: |
            dist/loki-vl-proxy-*
            dist/checksums.txt
            dist/loki-vl-proxy-*.tgz

      - name: Sync release metadata back to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main

          chmod +x scripts/ci/sync_release_metadata.sh
          scripts/ci/sync_release_metadata.sh "${VERSION}" "$(date +%Y-%m-%d)" "" .

          if git diff --quiet --exit-code -- CHANGELOG.md README.md docs/observability.md charts/loki-vl-proxy/Chart.yaml; then
            echo "release metadata already synced"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f -- CHANGELOG.md README.md docs/observability.md charts/loki-vl-proxy/Chart.yaml
          git commit -m "docs: sync release metadata for v${VERSION} [skip ci]"
          git push origin HEAD:main
