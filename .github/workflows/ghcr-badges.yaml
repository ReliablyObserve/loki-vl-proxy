name: GHCR Pull Badges

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

permissions:
  contents: write

jobs:
  update-ghcr-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pull counts
        id: pulls
        env:
          # The org packages API (download_count) requires the read:packages OAuth
          # scope. GITHUB_TOKEN returns 403. We reuse RELEASE_PR_TOKEN which is
          # already a PAT with repo scope and likely includes read:packages.
          # If it doesn't work, GHCR counts will show 0 with a warning — no new
          # secret is needed.
          RELEASE_PR_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          set -euo pipefail

          # GHCR pull counts — requires read:packages scope on org packages API.
          MAIN=0
          CHART=0
          if [ -n "${RELEASE_PR_TOKEN}" ]; then
            MAIN=$(curl -fsSL \
              -H "Authorization: Bearer ${RELEASE_PR_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/ReliablyObserve/packages/container/loki-vl-proxy" \
              | jq -r '.download_count // 0' 2>/dev/null || echo 0)
            CHART=$(curl -fsSL \
              -H "Authorization: Bearer ${RELEASE_PR_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/ReliablyObserve/packages/container/charts%2Floki-vl-proxy" \
              | jq -r '.download_count // 0' 2>/dev/null || echo 0)
          else
            echo "::warning::RELEASE_PR_TOKEN not set — GHCR pull counts will show 0."
          fi

          # Docker Hub pull count — public API, no auth needed.
          DOCKERHUB=0
          DOCKERHUB=$(curl -fsSL \
            "https://hub.docker.com/v2/repositories/reliablyobserve/loki-vl-proxy/" \
            | jq -r '.pull_count // 0' 2>/dev/null || echo 0)

          echo "main=${MAIN}"   >> "$GITHUB_OUTPUT"
          echo "chart=${CHART}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=${DOCKERHUB}" >> "$GITHUB_OUTPUT"
          echo "GHCR main pulls: ${MAIN}, chart pulls: ${CHART}, DockerHub pulls: ${DOCKERHUB}"

      - name: Write badge JSON files
        run: |
          fmt() {
            python3 -c "
          n = int('$1') if '$1' else 0
          if n >= 1_000_000:
              print(f'{n/1_000_000:.1f}M')
          elif n >= 1_000:
              print(f'{n/1_000:.1f}k')
          else:
              print(str(n))
          "
          }

          MAIN_FMT=$(fmt "${{ steps.pulls.outputs.main }}")
          CHART_FMT=$(fmt "${{ steps.pulls.outputs.chart }}")
          DOCKERHUB_FMT=$(fmt "${{ steps.pulls.outputs.dockerhub }}")

          mkdir -p /tmp/badges
          cat > /tmp/badges/ghcr-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "GHCR pulls",
            "message": "${MAIN_FMT}",
            "color": "blue",
            "namedLogo": "github"
          }
          EOF

          cat > /tmp/badges/ghcr-chart-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Helm Chart pulls",
            "message": "${CHART_FMT}",
            "color": "blue",
            "namedLogo": "github"
          }
          EOF

          cat > /tmp/badges/dockerhub-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Docker Hub pulls",
            "message": "${DOCKERHUB_FMT}",
            "color": "blue",
            "namedLogo": "docker"
          }
          EOF

      - name: Push badge data to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git checkout badges
            git pull origin badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p .github/badges
          cp /tmp/badges/ghcr-pulls.json       .github/badges/ghcr-pulls.json
          cp /tmp/badges/ghcr-chart-pulls.json .github/badges/ghcr-chart-pulls.json
          cp /tmp/badges/dockerhub-pulls.json  .github/badges/dockerhub-pulls.json

          git add .github/badges/
          git diff --cached --quiet || git commit -m "chore: update pull count badge data [skip ci]"
          git push origin badges
