name: GHCR Pull Badges

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

permissions:
  contents: write
  packages: read   # allows GITHUB_TOKEN to read org package metadata (version_count)

jobs:
  update-ghcr-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pull counts
        id: pulls
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # GHCR: try repository.packages GraphQL path — may expose statistics when
          # packages are linked to the repo via org.opencontainers.image.source label.
          MAIN_GQL=$(gh api graphql -f query='
            {
              repository(owner: "ReliablyObserve", name: "loki-vl-proxy") {
                packages(first: 10, packageType: DOCKER) {
                  nodes { name statistics { downloadsTotalCount } }
                }
              }
            }' 2>/dev/null || echo '{}')
          echo "repo packages GraphQL: $MAIN_GQL"

          MAIN=$(echo "$MAIN_GQL" \
            | jq -r '[.data.repository.packages.nodes[] | select(.name == "loki-vl-proxy") | .statistics.downloadsTotalCount] | first // 0' \
            2>/dev/null || echo 0)
          CHART=$(echo "$MAIN_GQL" \
            | jq -r '[.data.repository.packages.nodes[] | select(.name == "charts/loki-vl-proxy") | .statistics.downloadsTotalCount] | first // 0' \
            2>/dev/null || echo 0)

          # Docker Hub pull count — public API, no auth needed.
          DOCKERHUB=0
          DOCKERHUB=$(curl -fsSL \
            "https://hub.docker.com/v2/repositories/reliablyobserve/loki-vl-proxy/" \
            | jq -r '.pull_count // 0' 2>/dev/null || echo 0)

          {
            echo "main=${MAIN}"
            echo "chart=${CHART}"
            echo "dockerhub=${DOCKERHUB}"
          } >> "$GITHUB_OUTPUT"
          echo "GHCR main versions: ${MAIN}, chart versions: ${CHART}, DockerHub pulls: ${DOCKERHUB}"

      - name: Write badge JSON files
        run: |
          fmt() {
            python3 -c "
          n = int('$1') if '$1' else 0
          if n >= 1_000_000:
              print(f'{n/1_000_000:.1f}M')
          elif n >= 1_000:
              print(f'{n/1_000:.1f}k')
          else:
              print(str(n))
          "
          }

          MAIN_FMT=$(fmt "${{ steps.pulls.outputs.main }}")
          CHART_FMT=$(fmt "${{ steps.pulls.outputs.chart }}")
          DOCKERHUB_FMT=$(fmt "${{ steps.pulls.outputs.dockerhub }}")

          mkdir -p /tmp/badges
          cat > /tmp/badges/ghcr-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "GHCR versions",
            "message": "${MAIN_FMT}",
            "color": "blue",
            "namedLogo": "github"
          }
          EOF

          cat > /tmp/badges/ghcr-chart-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Helm versions",
            "message": "${CHART_FMT}",
            "color": "blue",
            "namedLogo": "github"
          }
          EOF

          cat > /tmp/badges/dockerhub-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Docker Hub pulls",
            "message": "${DOCKERHUB_FMT}",
            "color": "blue",
            "namedLogo": "docker"
          }
          EOF

      - name: Push badge data to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git checkout badges
            git pull origin badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p .github/badges
          cp /tmp/badges/ghcr-pulls.json       .github/badges/ghcr-pulls.json
          cp /tmp/badges/ghcr-chart-pulls.json .github/badges/ghcr-chart-pulls.json
          cp /tmp/badges/dockerhub-pulls.json  .github/badges/dockerhub-pulls.json

          git add .github/badges/
          git diff --cached --quiet || git commit -m "chore: update pull count badge data [skip ci]"
          git push origin badges
