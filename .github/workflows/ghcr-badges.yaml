name: Pull Count Badges

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch pull counts
        id: pulls
        run: |
          set -euo pipefail

          # Docker Hub container image pulls — public API, no auth needed.
          IMAGE=$(curl -fsSL \
            "https://hub.docker.com/v2/repositories/reliablyobserve/loki-vl-proxy/" \
            | jq -r '.pull_count // 0' 2>/dev/null || echo 0)

          # Docker Hub Helm chart pulls (OCI artifact, same API).
          # Falls back to 0 until first chart release is pushed to Docker Hub.
          CHART=$(curl -fsSL \
            "https://hub.docker.com/v2/repositories/reliablyobserve/charts%2Floki-vl-proxy/" \
            | jq -r '.pull_count // 0' 2>/dev/null || echo 0)

          {
            echo "image=${IMAGE}"
            echo "chart=${CHART}"
          } >> "$GITHUB_OUTPUT"
          echo "Container pulls: ${IMAGE}, Helm chart pulls: ${CHART}"

      - name: Write badge JSON files
        run: |
          fmt() {
            python3 -c "
          n = int('$1') if '$1' else 0
          if n >= 1_000_000:
              print(f'{n/1_000_000:.1f}M')
          elif n >= 1_000:
              print(f'{n/1_000:.1f}k')
          else:
              print(str(n))
          "
          }

          IMAGE_FMT=$(fmt "${{ steps.pulls.outputs.image }}")
          CHART_FMT=$(fmt "${{ steps.pulls.outputs.chart }}")

          mkdir -p /tmp/badges
          cat > /tmp/badges/ghcr-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "container pulls",
            "message": "${IMAGE_FMT}",
            "color": "blue",
            "namedLogo": "docker"
          }
          EOF

          cat > /tmp/badges/ghcr-chart-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "helm pulls",
            "message": "${CHART_FMT}",
            "color": "blue",
            "namedLogo": "helm"
          }
          EOF

      - name: Push badge data to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git checkout badges
            git pull origin badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p .github/badges
          cp /tmp/badges/ghcr-pulls.json       .github/badges/ghcr-pulls.json
          cp /tmp/badges/ghcr-chart-pulls.json .github/badges/ghcr-chart-pulls.json

          git add .github/badges/
          git diff --cached --quiet || git commit -m "chore: update pull count badge data [skip ci]"
          git push origin badges
