name: Pull Count Badges

on:
  push:
    branches: [main]
  schedule:
    - cron: '15 */4 * * *'  # every 4 hours at :15
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Fetch GHCR pull counts
        id: pulls
        run: |
          chmod +x scripts/ci/fetch_ghcr_pulls.sh
          scripts/ci/fetch_ghcr_pulls.sh ReliablyObserve loki-vl-proxy

      - name: Write badge JSON files
        run: |
          mkdir -p /tmp/badges

          cat > /tmp/badges/ghcr-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "GHCR pulls",
            "message": "${{ steps.pulls.outputs.image_fmt }}",
            "color": "blue",
            "namedLogo": "docker"
          }
          EOF

          cat > /tmp/badges/ghcr-chart-pulls.json <<EOF
          {
            "schemaVersion": 1,
            "label": "Helm pulls",
            "message": "${{ steps.pulls.outputs.chart_fmt }}",
            "color": "blue",
            "namedLogo": "helm"
          }
          EOF

      - name: Push badge data to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git checkout badges
            git pull origin badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p .github/badges
          cp /tmp/badges/ghcr-pulls.json       .github/badges/ghcr-pulls.json
          cp /tmp/badges/ghcr-chart-pulls.json .github/badges/ghcr-chart-pulls.json

          git add .github/badges/
          git diff --cached --quiet || git commit -m "chore: update GHCR pull count badges [skip ci]"
          git push origin badges
