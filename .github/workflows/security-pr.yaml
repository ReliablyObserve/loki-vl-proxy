name: Security PR

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "docs/observability.md"
      - "charts/loki-vl-proxy/Chart.yaml"
      - "README.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-static:
    name: Security / static
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.28.0 \
            detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        with:
          sarif_file: gitleaks.sarif

      - name: Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.7
          # Start with the higher-signal rule set and burn down the exclusions over time.
          "$(go env GOPATH)/bin/gosec" \
            -exclude=G104,G108,G115,G301,G302,G304,G306,G402,G404 \
            -exclude-generated \
            -exclude-dir=bench \
            -fmt sarif \
            -out gosec.sarif \
            ./...

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        with:
          sarif_file: gosec.sarif

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            aquasec/trivy:0.71.0 \
            fs . \
            --ignorefile .trivyignore.yaml \
            --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-fs.sarif \
            --exit-code 1 \
            --skip-version-check

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        with:
          sarif_file: trivy-fs.sarif

      - name: actionlint
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            rhysd/actionlint:1.7.7 \
            -color

      - name: hadolint
        run: |
          docker run --rm \
            -i \
            -v "$PWD/.hadolint.yaml:/root/.config/hadolint.yaml:ro" \
            hadolint/hadolint:v2.12.0 < Dockerfile

      - name: OpenSSF Scorecard
        continue-on-error: true
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Evaluate the PR/push commit, not the default branch HEAD.
          # For pull_request events GITHUB_SHA is the synthetic merge commit;
          # for push events it is the pushed commit — both reflect what will land.
          docker run --rm \
            -e GITHUB_AUTH_TOKEN="${GITHUB_AUTH_TOKEN}" \
            gcr.io/openssf/scorecard:stable \
            --repo="github.com/${GITHUB_REPOSITORY}" \
            --commit="${GITHUB_SHA}" \
            --format json \
            --show-details > scorecard.json

      - name: Enforce Scorecard guardrails
        if: hashFiles('scorecard.json') != ''
        run: |
          python3 scripts/ci/check_scorecard.py scorecard.json \
            --min-overall 5.0 \
            --require-check Dangerous-Workflow=10 \
            --require-check Binary-Artifacts=10 \
            --require-check CI-Tests=8 \
            --require-check SAST=7

      - name: Upload security static artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: security-static
          if-no-files-found: ignore
          path: |
            gitleaks.sarif
            gosec.sarif
            trivy-fs.sarif
            scorecard.json

  security-runtime:
    name: Security / runtime
    runs-on: ubuntu-latest
    needs: [security-static]
    env:
      PROXY_IMAGE: loki-vl-proxy:security-ci
      PROXY_BASE_URL: http://127.0.0.1:13100
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7
        with:
          go-version: "1.26.5"
          cache: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.PROXY_IMAGE }}
          load: true
          cache-from: type=gha,scope=security-proxy
          cache-to: type=gha,mode=max,scope=security-proxy

      - name: Start e2e stack
        working-directory: test/e2e-compat
        run: |
          docker compose up -d --no-build
          ../../scripts/ci/wait_e2e_stack.sh 180

      - name: Run security regressions
        run: ./scripts/ci/run_security_regressions.sh

      - name: ZAP baseline
        run: ./scripts/ci/run_zap_scan.sh baseline

      - name: Upload runtime security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: security-runtime
          path: |
            security-reports/zap

      - name: Tear down e2e stack
        if: always()
        working-directory: test/e2e-compat
        run: docker compose down -v
