version: "2"

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - unused
    - govet
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprintf
        - fmt.Fprintln
        - (*net/http.Request).ParseForm
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
