version: "2"

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - unused
    - govet
    - gofmt
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - encoding/json.Unmarshal
        - encoding/json.Marshal
        - fmt.Fprintf
        - fmt.Fprintln
        - (*net/http.Request).ParseForm
        - io.Copy
        - (io.Closer).Close
        - (*os.File).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
