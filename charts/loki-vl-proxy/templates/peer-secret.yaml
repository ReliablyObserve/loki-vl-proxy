{{- /*
Peer cache shared-token Secret.

Resolution order (highest priority first):
  A) peerCache.authToken set to a non-empty literal
     → render <release>-peer-auth-literal Secret with that token.
  B) peerCache.existingSecret set
     → reference operator-managed Secret; chart manages no Secret here.
  C) neither set, first install
     → generate randAlphaNum 32 into <release>-peer-auth.
  D) neither set, upgrade
     → reuse existing <release>-peer-auth via `lookup` (idempotent).

Explicit empty string for peerCache.authToken fails templating with a clear
error pointing at the fix — do NOT silently regenerate, that would surprise
operators who meant to set the key but typoed.
*/}}
{{- if .Values.peerCache.enabled }}
{{- if and (hasKey .Values.peerCache "authToken") (eq (toString (default "" .Values.peerCache.authToken)) "") (not (hasKey .Values.peerCache "existingSecret")) }}
{{- /* hasKey returns true when the key is present (even with empty value);
       we only fail when the key is present AND empty AND no existingSecret. */}}
{{- if (kindIs "string" .Values.peerCache.authToken) }}
{{- if eq .Values.peerCache.authToken "" }}
{{- fail "peerCache.authToken is set to empty string. Remove the key entirely to let the chart generate a Secret, set it to a non-empty value, or set peerCache.existingSecret to reference an external Secret." }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.peerCache.authToken }}
{{- /* Case A: chart-managed Secret with the literal token. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-peer-auth-literal
  labels:
    {{- include "loki-vl-proxy.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.peerCache.authToken | b64enc | quote }}
{{- else if .Values.peerCache.existingSecret }}
{{- /* Case B: operator-managed external Secret; chart emits nothing. */}}
{{- else }}
{{- /* Cases C/D: chart-managed Secret, idempotent across helm upgrade. */}}
{{- $secretName := printf "%s-peer-auth" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $token := "" }}
{{- if and $existing $existing.data (hasKey $existing.data "token") }}
{{- $token = index $existing.data "token" | b64dec }}
{{- else }}
{{- $token = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "loki-vl-proxy.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
{{- end }}
{{- end }}
