{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "loki-vl-proxy.fullname" . }}
  labels:
    {{- include "loki-vl-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "loki-vl-proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- /*
      Always allow ingress from chart-managed pods (e.g., helm test-connection pod).
      The test pod carries loki-vl-proxy.labels which include the selector labels.
    */}}
    - from:
        - podSelector:
            matchLabels:
              {{- include "loki-vl-proxy.selectorLabels" . | nindent 14 }}
      ports:
        - port: 3100
          protocol: TCP
    {{- if .Values.serviceMonitor.enabled }}
    {{- /*
      Allow Prometheus to scrape the dedicated metrics port. Without this,
      enabling serviceMonitor under the default NetworkPolicy (which otherwise
      only opens the proxy port 3100) silently times out the /metrics scrape.
      Scope the source one of two ways:
        1. networkPolicy.monitoringNamespace (convenience) — a namespace name,
           rendered as a namespaceSelector on kubernetes.io/metadata.name.
        2. networkPolicy.monitoringFrom (explicit) — a list of NetworkPolicyPeer.
      monitoringFrom wins if both are set. When BOTH are empty the port is open
      to all sources (zero-config default) — /metrics is non-sensitive read-only
      counters, but scoping it with one of the above is recommended.
    */}}
    {{- if .Values.networkPolicy.monitoringFrom }}
    - from:
        {{- toYaml .Values.networkPolicy.monitoringFrom | nindent 8 }}
      ports:
        - port: {{ include "loki-vl-proxy.metricsPort" . | int }}
          protocol: TCP
    {{- else if .Values.networkPolicy.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | quote }}
      ports:
        - port: {{ include "loki-vl-proxy.metricsPort" . | int }}
          protocol: TCP
    {{- else }}
    - ports:
        - port: {{ include "loki-vl-proxy.metricsPort" . | int }}
          protocol: TCP
    {{- end }}
    {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
