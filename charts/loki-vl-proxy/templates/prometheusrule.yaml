{{- if .Values.prometheusRule.enabled }}
{{- $baseRules := tpl (.Files.Get "alerting/loki-vl-proxy-prometheusrule.yaml") . | fromYaml }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "loki-vl-proxy.fullname" . }}
  namespace: {{ .Values.prometheusRule.namespace | default .Release.Namespace }}
  labels:
    {{- include "loki-vl-proxy.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ $baseRules.groupName | default "loki-vl-proxy" }}
      interval: {{ $baseRules.interval | default "30s" }}
      rules:
        {{- toYaml ($baseRules.rules | default (list)) | nindent 8 }}
        {{- with .Values.prometheusRule.additionalRules }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
