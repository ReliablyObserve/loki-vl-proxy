apiVersion: apps/v1
kind: {{ include "loki-vl-proxy.workloadKind" . }}
metadata:
  name: {{ include "loki-vl-proxy.fullname" . }}
  labels:
    {{- include "loki-vl-proxy.labels" . | nindent 4 }}
spec:
  {{- if eq (include "loki-vl-proxy.workloadKind" .) "StatefulSet" }}
  serviceName: {{ include "loki-vl-proxy.headlessServiceName" . }}
  podManagementPolicy: {{ .Values.workload.statefulSet.podManagementPolicy }}
  updateStrategy:
    {{- toYaml .Values.workload.statefulSet.updateStrategy | nindent 4 }}
  {{- with .Values.workload.statefulSet.persistentVolumeClaimRetentionPolicy }}
  persistentVolumeClaimRetentionPolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- else }}
  {{- with .Values.workload.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- if not .Values.horizontalPodAutoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "loki-vl-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "loki-vl-proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "loki-vl-proxy.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $hostProcEnabled := false }}
      {{- $hostProcMountPath := "/host/proc" }}
      {{- $customPatternsFileEnabled := .Values.patternsCustom.file.enabled }}
      {{- $customPatternsFilePath := default "/etc/loki-vl-proxy/patterns/custom-patterns.json" .Values.patternsCustom.file.path }}
      {{- $customPatternsMountDir := dir $customPatternsFilePath }}
      {{- $customPatternsFileName := base $customPatternsFilePath }}
      {{- $observability := default (dict) .Values.observability }}
      {{- $observabilityOTEL := default (dict) (get $observability "otel") }}
      {{- $observabilityOTLP := default (dict) (get $observability "otlp") }}
      {{- $observabilityMetrics := default (dict) (get $observability "metrics") }}
      {{- $observabilityServer := default (dict) (get $observability "server") }}
      {{- if and (hasKey .Values "systemMetrics") (hasKey .Values.systemMetrics "hostProc") }}
      {{- $hostProcEnabled = .Values.systemMetrics.hostProc.enabled }}
      {{- if .Values.systemMetrics.hostProc.mountPath }}
      {{- $hostProcMountPath = .Values.systemMetrics.hostProc.mountPath }}
      {{- end }}
      {{- end }}
      containers:
        - name: loki-vl-proxy
          {{- $goMemLimitValue := (include "loki-vl-proxy.goMemLimitValue" . | trim) }}
          {{- $injectOTELFromPod := true }}
          {{- if and (hasKey .Values "otelResourceAttributes") (hasKey .Values.otelResourceAttributes "injectFromPod") }}
          {{- $injectOTELFromPod = .Values.otelResourceAttributes.injectFromPod }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            {{- range $key, $value := .Values.extraArgs }}
            - "-{{ $key }}={{ $value }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "deployment-environment")) (ne (default "" (get $observability "deploymentEnvironment")) "") }}
            - "-deployment-environment={{ get $observability "deploymentEnvironment" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otel-service-name")) (ne (default "" (get $observabilityOTEL "serviceName")) "") }}
            - "-otel-service-name={{ get $observabilityOTEL "serviceName" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otel-service-namespace")) (ne (default "" (get $observabilityOTEL "serviceNamespace")) "") }}
            - "-otel-service-namespace={{ get $observabilityOTEL "serviceNamespace" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otel-service-instance-id")) (ne (default "" (get $observabilityOTEL "serviceInstanceId")) "") }}
            - "-otel-service-instance-id={{ get $observabilityOTEL "serviceInstanceId" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otlp-endpoint")) (ne (default "" (get $observabilityOTLP "endpoint")) "") }}
            - "-otlp-endpoint={{ get $observabilityOTLP "endpoint" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otlp-interval")) (ne (default "" (get $observabilityOTLP "interval")) "") }}
            - "-otlp-interval={{ get $observabilityOTLP "interval" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otlp-compression")) (ne (default "" (get $observabilityOTLP "compression")) "") }}
            - "-otlp-compression={{ get $observabilityOTLP "compression" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otlp-timeout")) (ne (default "" (get $observabilityOTLP "timeout")) "") }}
            - "-otlp-timeout={{ get $observabilityOTLP "timeout" }}"
            {{- end }}
            {{- if and (not (hasKey .Values.extraArgs "otlp-headers")) (ne (default "" (get $observabilityOTLP "headers")) "") }}
            - "-otlp-headers={{ get $observabilityOTLP "headers" }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "otlp-tls-skip-verify") }}
            - "-otlp-tls-skip-verify={{ ternary "true" "false" (default false (get $observabilityOTLP "tlsSkipVerify")) }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "metrics.max-tenants") }}
            - "-metrics.max-tenants={{ default 256 (get $observabilityMetrics "maxTenants") }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "metrics.max-clients") }}
            - "-metrics.max-clients={{ default 256 (get $observabilityMetrics "maxClients") }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "metrics.trust-proxy-headers") }}
            - "-metrics.trust-proxy-headers={{ ternary "true" "false" (default false (get $observabilityMetrics "trustProxyHeaders")) }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "metrics.export-sensitive-labels") }}
            - "-metrics.export-sensitive-labels={{ ternary "true" "false" (default false (get $observabilityMetrics "exportSensitiveLabels")) }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "server.register-instrumentation") }}
            - "-server.register-instrumentation={{ ternary "true" "false" (default true (get $observabilityServer "registerInstrumentation")) }}"
            {{- end }}
            {{- if not (hasKey .Values.extraArgs "server.metrics-max-concurrency") }}
            - "-server.metrics-max-concurrency={{ default 1 (get $observabilityServer "metricsMaxConcurrency") }}"
            {{- end }}
            {{- if and $hostProcEnabled (not (hasKey .Values.extraArgs "proc-root")) }}
            - "-proc-root={{ $hostProcMountPath }}"
            {{- end }}
            {{- if and .Values.persistence.enabled (not (hasKey .Values.extraArgs "disk-cache-path")) }}
            - "-disk-cache-path={{ include "loki-vl-proxy.diskCachePath" . }}"
            {{- end }}
            {{- if and (gt (len .Values.patternsCustom.inline) 0) (not (hasKey .Values.extraArgs "patterns-custom")) }}
            - '-patterns-custom={{ toJson .Values.patternsCustom.inline }}'
            {{- end }}
            {{- if and $customPatternsFileEnabled (not (hasKey .Values.extraArgs "patterns-custom-file")) }}
            - "-patterns-custom-file={{ $customPatternsFilePath }}"
            {{- end }}
            {{- if .Values.peerCache.enabled }}
            - "-peer-self=$(POD_IP):3100"
            - "-peer-discovery={{ .Values.peerCache.discovery }}"
            {{- if eq .Values.peerCache.discovery "dns" }}
            - "-peer-dns={{ include "loki-vl-proxy.peerServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local"
            {{- else if eq .Values.peerCache.discovery "static" }}
            - "-peer-static={{ join "," .Values.peerCache.peers }}"
            {{- end }}
            {{- end }}
          {{- if or .Values.peerCache.enabled .Values.env $goMemLimitValue $injectOTELFromPod }}
          env:
            {{- if $goMemLimitValue }}
            - name: GOMEMLIMIT
              value: {{ $goMemLimitValue | quote }}
            {{- end }}
            {{- if $injectOTELFromPod }}
            - name: OTEL_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            {{- if .Values.peerCache.enabled }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          {{- if .Values.probe.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probe.liveness.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.probe.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probe.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probe.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probe.liveness.failureThreshold }}
            successThreshold: {{ .Values.probe.liveness.successThreshold }}
          {{- end }}
          {{- if .Values.probe.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probe.readiness.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.probe.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probe.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probe.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probe.readiness.failureThreshold }}
            successThreshold: {{ .Values.probe.readiness.successThreshold }}
          {{- end }}
          {{- if .Values.probe.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probe.startup.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.probe.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probe.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probe.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probe.startup.failureThreshold }}
          {{- end }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.extraVolumeMounts $hostProcEnabled $customPatternsFileEnabled }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: cache-data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if $hostProcEnabled }}
            - name: host-proc
              mountPath: {{ $hostProcMountPath }}
              readOnly: true
            {{- end }}
            {{- if $customPatternsFileEnabled }}
            - name: custom-patterns
              mountPath: {{ $customPatternsMountDir | quote }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.extraVolumes $hostProcEnabled $customPatternsFileEnabled (and .Values.persistence.enabled (or .Values.persistence.existingClaim (ne (include "loki-vl-proxy.workloadKind" .) "StatefulSet"))) }}
      volumes:
        {{- if and .Values.persistence.enabled (or .Values.persistence.existingClaim (ne (include "loki-vl-proxy.workloadKind" .) "StatefulSet")) }}
        - name: cache-data
          persistentVolumeClaim:
            claimName: {{ include "loki-vl-proxy.persistenceClaimName" . }}
        {{- end }}
        {{- if $hostProcEnabled }}
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        {{- end }}
        {{- if $customPatternsFileEnabled }}
        - name: custom-patterns
          configMap:
            name: {{ include "loki-vl-proxy.customPatternsConfigMapName" . }}
            items:
              - key: {{ default "custom-patterns.json" .Values.patternsCustom.file.key | quote }}
                path: {{ $customPatternsFileName | quote }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
  {{- if and (eq (include "loki-vl-proxy.workloadKind" .) "StatefulSet") (or (and .Values.persistence.enabled (not .Values.persistence.existingClaim)) .Values.persistence.extraVolumeClaimTemplates) }}
  volumeClaimTemplates:
    {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
    - metadata:
        name: cache-data
        labels:
          {{- include "loki-vl-proxy.selectorLabels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- end }}
    {{- with .Values.persistence.extraVolumeClaimTemplates }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
