# Full e2e compatibility stack:
# - Real Loki (reference implementation)
# - VictoriaLogs (backend)
# - Loki-VL-proxy (translating proxy)
# - Grafana with all 3 datasources configured
# - Playwright for UI testing
#
# Usage:
#   docker-compose up -d --build
#   go test -v -tags=e2e -timeout=180s ./test/e2e-compat/
#   # UI tests:
#   cd ../e2e-ui && npm install && npx playwright install chromium && npm test
#   # Or open Grafana at http://localhost:3002 for manual comparison

services:
  # Reference Loki instance (ground truth)
  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.7.1}
    container_name: e2e-loki
    # Loki image runs as uid 10001; named volume defaults to root-owned and
    # Loki crashes with "mkdir /tmp/loki/rules: permission denied". Run as root
    # in e2e so the persistent volume is writable. (Production would use an
    # init container to chown the volume.)
    user: "0:0"
    ports:
      - "13101:3100"
    # Bumped 8g → 12g on 2026-06-05 — 8 GiB was OOM-killing Loki at idle once
    # the 7-day dataset had accumulated 6.7 GiB of bigParts + indexed streams,
    # which made every bench query land on a Loki that was either OOM-recovering
    # or actively crashing. That produced misleadingly bad numbers in earlier
    # runs (0/24 successes at 30m-3h). 12 GiB gives Loki enough idle headroom
    # (~5 GB working set + 7 GB query buffer) to actually serve the workload
    # for a fair comparison. Docker Desktop host cap on the dev box is ~17 GB
    # so we can't go higher without starving VL + the proxy variants.
    mem_limit: 12g
    # GOMEMLIMIT keeps Go GC ahead of the cgroup OOM-killer so Loki shrinks
    # its heap before getting SIGKILL'd. GOGC=80 trades a few percent CPU for
    # ~15% lower peak heap; necessary on the constrained host budget.
    environment:
      - GOMEMLIMIT=10GiB
      - GOGC=80
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-local-config.yaml:/etc/loki/local-config.yaml:ro
      # Persist chunks across container recreations. Without this the
      # in-container /tmp/loki gets wiped on every restart, losing all
      # ingested logs and making any range > "since restart" return empty —
      # which fakes a divergence with the proxy (whose VL backend IS persisted).
      - e2e-loki-data:/tmp/loki
    # Loki 3.7.1 image is minimal (no wget/curl/shell) — healthcheck uses NONE.
    # Tests retry on connection failure.
    healthcheck:
      disable: true

  # VictoriaLogs backend
  victorialogs:
    image: ${VICTORIALOGS_IMAGE:-victoriametrics/victoria-logs:v1.50.0}
    container_name: e2e-victorialogs
    ports:
      - "19428:9428"
    # Hard memory cap: Docker OOM-kills and restarts the container rather than
    # letting unconstrained query memory exhaust the host. Without this, 50+
    # concurrent 48–72h queries each allocate ~100–200 MB of working buffers,
    # totalling 5–10 GB before the kernel OOM-kills the whole process silently.
    # Bench peaks (no query guards): heavy c=100=2,429 MB; long_range c=50=5,237 MB (crash).
    # With -search.maxQueryDuration=60s + -search.maxQueryTimeRange=72h, long queries
    # are cancelled before full materialization → expected ceiling ~4,000 MB.
    # +30% headroom: 4,000 × 1.3 = 5,200 MB → 5g. Container auto-restarts on OOM.
    mem_limit: 5g
    restart: unless-stopped
    command:
      - "-storageDataPath=/vlogs"
      # Keep enough history for long-range Drilldown regressions (>24h).
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:9428"
      # Allow high concurrency for benchmark comparisons (default 16 causes 100% errors at c≥50).
      - "-search.maxConcurrentRequests=100"
      # Increase queue wait time: at c=100 some requests will queue behind the
      # concurrency limit; give them up to 60s before returning 503.
      - "-search.maxQueueDuration=60s"
      # Cap individual query execution time. Default is 30s; long-range queries
      # that hit the memory limit get cancelled rather than hanging indefinitely.
      # NOTE: -search.maxQueryTimeRange is intentionally omitted. It rejects queries
      # with no time range (the proxy omits bounds on metadata queries), which trips
      # the circuit breaker on every label/series request. The mem_limit + maxQueryDuration
      # guards are sufficient protection without this flag.
      - "-search.maxQueryDuration=60s"
      # Cache tuning: cache from the first miss (default=2) to maximise hit rate
      # for repeated benchmark runs and warm-cache proxy measurements.
      - "-blockcache.missesBeforeCaching=1"
      # Intern short strings (labels, field names) for up to 15 min to reduce GC
      # pressure during high-concurrency scans (default 5 min).
      - "-internStringCacheExpireDuration=15m"
      # Allow VL to use up to 80% of host RAM for its in-process caches before
      # evicting. Higher than the default 60% is safe given the 5 g mem_limit cap.
      - "-memory.allowedPercent=80"
      # Reduce parallel readers per query (default = 2×CPU = 36 on 18-core host).
      # At c=100 with 36 readers each, that spawns 3600 goroutines fighting for
      # disk I/O — local SSD has <0.1ms latency so many readers add contention,
      # not parallelism. 8 readers × 100 concurrent = 800 goroutines, matching
      # 18 cores without scheduler thrash.
      - "-defaultParallelReaders=8"
      # Cap file-system concurrency (default 256 = 16×CPU, but 64 better fits 18 cores).
      - "-fs.maxConcurrency=64"
      # Flush in-memory ingest buffers to disk every 1 s (default 5 s). E2E tests
      # additionally call POST /internal/force_flush right after ingest for hard
      # determinism, but a tighter periodic flush keeps any non-flush-aware test
      # paths queryable within a second or two. Cost: slightly more frequent
      # small-part creation; merge cadence absorbs it without operator effort.
      # Source: https://docs.victoriametrics.com/victorialogs/#forced-flush
      - "-inmemoryDataFlushInterval=1s"
    volumes:
      - vl-data:/vlogs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # VictoriaMetrics Auth proxy in front of VictoriaLogs
  vmauth:
    image: ${VMAUTH_IMAGE:-victoriametrics/vmauth:v1.138.0}
    container_name: e2e-vmauth
    command:
      - "-auth.config=/etc/vmauth/auth.yml"
      - "-httpListenAddr=:8427"
    volumes:
      - ./vmauth.yml:/etc/vmauth/auth.yml:ro
    depends_on:
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8427/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # VictoriaMetrics TSDB for vmalert recording-rule remote write
  victoriametrics:
    image: ${VICTORIAMETRICS_IMAGE:-victoriametrics/victoria-metrics:v1.119.0}
    container_name: e2e-victoriametrics
    # Expose to host so the bench script + ad-hoc curl can query process_cpu /
    # RSS time-series for the bench window. Single-node VM with -promscrape.config
    # scrapes /metrics from proxy, vmauth, loki, victorialogs every 5s — no
    # separate vmagent needed.
    ports:
      - "18428:8428"
    command:
      - "-storageDataPath=/vm-data"
      - "-httpListenAddr=:8428"
      - "-promscrape.config=/etc/vm/scrape.yml"
      - "-promscrape.config.strictParse=false"
    volumes:
      - vm-data:/vm-data
      - ./vm-scrape.yml:/etc/vm/scrape.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # vmalert alert/rule backend against VictoriaLogs
  vmalert:
    image: ${VMALERT_IMAGE:-victoriametrics/vmalert:v1.138.0}
    container_name: e2e-vmalert
    working_dir: /rules
    ports:
      - "18880:8880"
    command:
      - "-httpListenAddr=:8880"
      - "-datasource.url=http://victorialogs:9428"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-notifier.blackhole"
      - "-rule=compat.rules"
      - "-configCheckInterval=5s"
    volumes:
      - ./vmalert-rules.yml:/rules/compat.rules:ro
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/api/v1/rules?datasource_type=vlogs"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy (translating proxy under test)
  loki-vl-proxy:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy
    ports:
      - "13100:3100"
    volumes:
      # Named volume so L2 disk cache survives container restarts (used by
      # scripts/bench-cache-tiers.sh "L2 promotion across restart" measurement).
      - e2e-proxy-cache:/cache
    environment:
      # Soft GC pressure limit: without this, Go's GC only triggers at 2× live
      # heap, allowing RSS to balloon to 4+ GB under sustained long_range load
      # (sequential c=10/50/100 runs accumulate heap pages even as LRU cache
      # evicts entries). 2 GiB keeps GC aggressive without capping the 256 MB
      # window cache or causing unnecessary collection on small workloads.
      - GOMEMLIMIT=2GiB
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=60s"
      - "-label-values-indexed-cache=true"
      - "-label-values-hot-limit=200"
      - "-label-values-index-max-entries=50000"
      - "-label-values-index-persist-path=/cache/label-values-index.json"
      - "-label-values-index-persist-interval=5s"
      - "-label-values-index-startup-stale-threshold=30s"
      - "-label-values-index-startup-peer-warm-timeout=2s"
      # L2 disk cache (bbolt) — enables across-restart cache reuse so bench
      # script can measure L1 -> L2 promotion after `docker compose restart`.
      - "-disk-cache-path=/cache/proxy-l2.bolt"
      - "-disk-cache-max-bytes=536870912"
      - "-disk-cache-min-ttl=15s"
      # L3 peer cache (static discovery, 3-node ring with self + 2 peers).
      - "-peer-discovery=static"
      - "-peer-self=loki-vl-proxy:3100"
      - "-peer-self-az=zone-a"
      - "-peer-static=loki-vl-proxy:3100,loki-vl-proxy-peer-a:3100,loki-vl-proxy-peer-b:3100"
      - "-peer-auth-token=e2e-peer-shared-token"
      - "-peer-hot-read-ahead-enabled=true"
      # Disable rate limiting so benchmark clients (single IP) are not throttled.
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      # pprof for benchmark profiling (CPU/heap/alloc capture during bench runs).
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=bench-pprof-token"
      # Explicit defaults — underscores+translated+emit=true for full Loki OTel compatibility
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # L3 peer #1 — shares cache writes with main proxy + peer-b via static ring.
  # Bench script "L3 cross-peer" test warms a key on peer-a then queries peer-b
  # to verify the second peer fetches from the first instead of going to VL.
  loki-vl-proxy-peer-a:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-peer-a
    ports:
      - "13150:3100"
    volumes:
      - e2e-proxy-peer-a-cache:/cache
    environment:
      - GOMEMLIMIT=2GiB
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=60s"
      - "-label-values-indexed-cache=true"
      - "-label-values-hot-limit=200"
      - "-label-values-index-max-entries=50000"
      - "-label-values-index-persist-path=/cache/label-values-index.json"
      - "-label-values-index-persist-interval=5s"
      - "-label-values-index-startup-stale-threshold=30s"
      - "-label-values-index-startup-peer-warm-timeout=2s"
      - "-disk-cache-path=/cache/proxy-l2.bolt"
      - "-disk-cache-max-bytes=536870912"
      - "-disk-cache-min-ttl=15s"
      - "-peer-discovery=static"
      - "-peer-self=loki-vl-proxy-peer-a:3100"
      - "-peer-self-az=zone-a"
      - "-peer-static=loki-vl-proxy:3100,loki-vl-proxy-peer-a:3100,loki-vl-proxy-peer-b:3100"
      - "-peer-auth-token=e2e-peer-shared-token"
      - "-peer-hot-read-ahead-enabled=true"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=bench-pprof-token"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # L3 peer #2 — second member of the static peer ring.
  loki-vl-proxy-peer-b:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-peer-b
    ports:
      - "13151:3100"
    volumes:
      - e2e-proxy-peer-b-cache:/cache
    environment:
      - GOMEMLIMIT=2GiB
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=60s"
      - "-label-values-indexed-cache=true"
      - "-label-values-hot-limit=200"
      - "-label-values-index-max-entries=50000"
      - "-label-values-index-persist-path=/cache/label-values-index.json"
      - "-label-values-index-persist-interval=5s"
      - "-label-values-index-startup-stale-threshold=30s"
      - "-label-values-index-startup-peer-warm-timeout=2s"
      - "-disk-cache-path=/cache/proxy-l2.bolt"
      - "-disk-cache-max-bytes=536870912"
      - "-disk-cache-min-ttl=15s"
      - "-peer-discovery=static"
      - "-peer-self=loki-vl-proxy-peer-b:3100"
      - "-peer-self-az=zone-b"
      - "-peer-static=loki-vl-proxy:3100,loki-vl-proxy-peer-a:3100,loki-vl-proxy-peer-b:3100"
      - "-peer-auth-token=e2e-peer-shared-token"
      - "-peer-hot-read-ahead-enabled=true"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=bench-pprof-token"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with query-driven patterns autodetect enabled
  loki-vl-proxy-patterns-autodetect:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-patterns-autodetect
    user: root
    ports:
      - "13110:3100"
    volumes:
      - patterns-cache:/cache
    environment:
      - GOMEMLIMIT=2GiB
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=hybrid"
      - "-emit-structured-metadata=true"
      - "-patterns-enabled=true"
      - "-patterns-autodetect-from-queries=true"
      - "-patterns-persist-path=/cache/patterns-snapshot.json"
      - "-patterns-persist-interval=5s"
      - "-patterns-startup-stale-threshold=30s"
      - "-patterns-startup-peer-warm-timeout=2s"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with backend routed through vmauth
  loki-vl-proxy-vmauth:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-vmauth
    ports:
      - "13109:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://vmauth:8427"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      vmauth:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with label-style=underscores (for OTel dot→underscore tests)
  loki-vl-proxy-underscore:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-underscore
    ports:
      - "13102:3100"
    environment:
      # Soft GC pressure limit: hybrid mode + no label-values index = many concurrent
      # VL NDJSON responses in memory. Without GOMEMLIMIT Go's GC only triggers at
      # 2× live heap, causing rapid unbounded growth under e2e load.
      # 2 GiB gives headroom above the 64 MB window cache + streaming buffers.
      - GOMEMLIMIT=2GiB
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=hybrid"
      - "-emit-structured-metadata=true"
      # Cap the query_range window cache to 64 MB. The default 256 MB is sized for
      # large deployments; the e2e underscore proxy handles only test load.
      - "-cache-max-bytes=67108864"
      # Disable rate limiting and concurrency cap so benchmark clients (single IP)
      # are not throttled — matches the main proxy benchmark configuration.
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with underscore labels but native metadata field mode
  loki-vl-proxy-native-metadata:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-native-metadata
    ports:
      - "13106:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=native"
      - "-emit-structured-metadata=true"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with underscore labels and translated-only metadata aliases
  loki-vl-proxy-translated-metadata:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-translated-metadata
    ports:
      - "13107:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with underscore labels and structured metadata disabled
  loki-vl-proxy-no-metadata:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-no-metadata
    ports:
      - "13108:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=false"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with synthetic tail and browser origin allowlist for real UI /tail tests
  loki-vl-proxy-tail:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-tail
    ports:
      - "13103:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=debug"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-tail.mode=synthetic"
      - "-tail.allowed-origins=http://grafana:3000,http://127.0.0.1:3002,http://localhost:3002"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  loki-vl-proxy-tail-native:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-tail-native
    ports:
      - "13105:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=debug"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-tail.mode=native"
      - "-tail.allowed-origins=http://grafana:3000,http://127.0.0.1:3002,http://localhost:3002"
      - "-rate-limit-per-second=0"
      - "-rate-limit-burst=0"
      - "-max-concurrent=0"
      - "-metadata-default-lookback=0"
      - "-server.enable-pprof"
      - "-server.register-instrumentation=true"
      - "-server.admin-auth-token=e2e-test-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  tail-ingress:
    image: nginx:1.27-alpine
    container_name: e2e-tail-ingress
    ports:
      - "13104:8080"
    volumes:
      - ./nginx-tail.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      loki-vl-proxy-tail:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/nginx-health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Continuous log generator — dual-writes realistic multi-service logs to Loki + VictoriaLogs.
  # Provides live data for Grafana Explore UI tests and Logs Drilldown pattern detection.
  #
  # profile: ui — intentionally kept so this does NOT start during automated e2e-compat test
  # runs (which use plain "docker compose up -d"). High-volume non-OTel data from the generator
  # dilutes detected_fields results and breaks OTel tests. UI/Drilldown manual testing uses:
  #   docker compose --profile ui up -d
  #
  # LOG_INTERVAL=2 / LOG_BATCH=15: ~75 lines/s total — enough for stable pattern clustering
  # across time-step buckets so Drilldown shows a continuous timeline rather than sparse points.
  log-generator:
    image: python:3.12-alpine
    container_name: e2e-log-generator
    profiles: ["ui"]
    command: python /scripts/log-generator.py
    volumes:
      - ./log-generator.py:/scripts/log-generator.py:ro
    environment:
      - LOKI_URL=http://loki:3100
      - VL_URL=http://victorialogs:9428
      - LOG_INTERVAL=2
      - LOG_BATCH=15
    depends_on:
      loki:
        condition: service_started
      victorialogs:
        condition: service_healthy
    restart: unless-stopped

  # Grafana with 3 datasources for manual side-by-side comparison
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    container_name: e2e-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_PLUGINS_PREINSTALL=victoriametrics-logs-datasource@0.26.3,grafana-lokiexplore-app
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-lokiexplore-app
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - loki
      - loki-vl-proxy
      - loki-vl-proxy-patterns-autodetect
      - loki-vl-proxy-vmauth
      - loki-vl-proxy-underscore
      - loki-vl-proxy-native-metadata
      - loki-vl-proxy-tail
      - loki-vl-proxy-tail-native
      - tail-ingress

volumes:
  vl-data:
  vm-data:
  patterns-cache:
  e2e-loki-data:  # Loki chunks (BoltDB-shipper + filesystem) — persist across container restarts
  # Per-proxy named volumes so L2 disk cache (bbolt) survives `docker compose restart`.
  # Each proxy gets its own volume — sharing would break bbolt single-writer locks.
  e2e-proxy-cache:
  e2e-proxy-peer-a-cache:
  e2e-proxy-peer-b-cache:
