version: "3.8"

# Full e2e compatibility stack:
# - Real Loki (reference implementation)
# - VictoriaLogs (backend)
# - Loki-VL-proxy (translating proxy)
# - Grafana with all 3 datasources configured
# - Playwright for UI testing
#
# Usage:
#   docker-compose up -d --build
#   go test -v -tags=e2e -timeout=120s ./test/e2e-compat/
#   # UI tests:
#   cd ../e2e-ui && npm install && npx playwright install chromium && npm test
#   # Or open Grafana at http://localhost:3002 for manual comparison

services:
  # Reference Loki instance (ground truth)
  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.7.1}
    container_name: e2e-loki
    ports:
      - "3101:3100"
    command: -config.file=/etc/loki/local-config.yaml
    # Loki 3.7.1 image is minimal (no wget/curl/shell) — healthcheck uses NONE.
    # Tests retry on connection failure.
    healthcheck:
      disable: true

  # VictoriaLogs backend
  victorialogs:
    image: ${VICTORIALOGS_IMAGE:-victoriametrics/victoria-logs:v1.49.0}
    container_name: e2e-victorialogs
    ports:
      - "9428:9428"
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:9428"
    volumes:
      - vl-data:/vlogs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # vmalert alert/rule backend against VictoriaLogs
  vmalert:
    image: ${VMALERT_IMAGE:-victoriametrics/vmalert:v1.139.0}
    container_name: e2e-vmalert
    working_dir: /rules
    ports:
      - "8880:8880"
    command:
      - "-httpListenAddr=:8880"
      - "-datasource.url=http://victorialogs:9428"
      - "-notifier.blackhole"
      - "-rule=compat.rules"
      - "-configCheckInterval=5s"
    volumes:
      - ./vmalert-rules.yml:/rules/compat.rules:ro
    depends_on:
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/api/v1/rules?datasource_type=vlogs"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy (translating proxy under test)
  loki-vl-proxy:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy
    ports:
      - "3100:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=debug"
      - "-cache-ttl=5s"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with label-style=underscores (for OTel dot→underscore tests)
  loki-vl-proxy-underscore:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-underscore
    ports:
      - "3102:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=debug"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Grafana with 3 datasources for manual side-by-side comparison
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.4.2}
    container_name: e2e-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - loki
      - loki-vl-proxy
      - loki-vl-proxy-underscore

volumes:
  vl-data:
