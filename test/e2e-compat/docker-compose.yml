# Full e2e compatibility stack:
# - Real Loki (reference implementation)
# - VictoriaLogs (backend)
# - Loki-VL-proxy (translating proxy)
# - Grafana with all 3 datasources configured
# - Playwright for UI testing
#
# Usage:
#   docker-compose up -d --build
#   go test -v -tags=e2e -timeout=180s ./test/e2e-compat/
#   # UI tests:
#   cd ../e2e-ui && npm install && npx playwright install chromium && npm test
#   # Or open Grafana at http://localhost:3002 for manual comparison

services:
  # Reference Loki instance (ground truth)
  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.7.1}
    container_name: e2e-loki
    ports:
      - "3101:3100"
    # Bench peak: 1,798 MB (heavy c=100). +30% headroom = 2,337 MB → 2.4g.
    # Loki RSS is stable across all workloads (1.4–1.8 GB range), so this
    # cap is not expected to trigger; it guards against runaway situations.
    mem_limit: 2400m
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-local-config.yaml:/etc/loki/local-config.yaml:ro
    # Loki 3.7.1 image is minimal (no wget/curl/shell) — healthcheck uses NONE.
    # Tests retry on connection failure.
    healthcheck:
      disable: true

  # VictoriaLogs backend
  victorialogs:
    image: ${VICTORIALOGS_IMAGE:-victoriametrics/victoria-logs:v1.50.0}
    container_name: e2e-victorialogs
    ports:
      - "9428:9428"
    # Hard memory cap: Docker OOM-kills and restarts the container rather than
    # letting unconstrained query memory exhaust the host. Without this, 50+
    # concurrent 48–72h queries each allocate ~100–200 MB of working buffers,
    # totalling 5–10 GB before the kernel OOM-kills the whole process silently.
    # Bench peaks (no query guards): heavy c=100=2,429 MB; long_range c=50=5,237 MB (crash).
    # With -search.maxQueryDuration=60s + -search.maxQueryTimeRange=72h, long queries
    # are cancelled before full materialization → expected ceiling ~4,000 MB.
    # +30% headroom: 4,000 × 1.3 = 5,200 MB → 5g. Container auto-restarts on OOM.
    mem_limit: 5g
    restart: unless-stopped
    command:
      - "-storageDataPath=/vlogs"
      # Keep enough history for long-range Drilldown regressions (>24h).
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:9428"
      # Allow high concurrency for benchmark comparisons (default 16 causes 100% errors at c≥50).
      - "-search.maxConcurrentRequests=100"
      # Increase queue wait time: at c=100 some requests will queue behind the
      # concurrency limit; give them up to 60s before returning 503.
      - "-search.maxQueueDuration=60s"
      # Cap individual query execution time. Default is 30s; long-range queries
      # that hit the memory limit get cancelled rather than hanging indefinitely.
      # NOTE: -search.maxQueryTimeRange is intentionally omitted. It rejects queries
      # with no time range (the proxy omits bounds on metadata queries), which trips
      # the circuit breaker on every label/series request. The mem_limit + maxQueryDuration
      # guards are sufficient protection without this flag.
      - "-search.maxQueryDuration=60s"
      # Cache tuning: cache from the first miss (default=2) to maximise hit rate
      # for repeated benchmark runs and warm-cache proxy measurements.
      - "-blockcache.missesBeforeCaching=1"
      # Intern short strings (labels, field names) for up to 15 min to reduce GC
      # pressure during high-concurrency scans (default 5 min).
      - "-internStringCacheExpireDuration=15m"
      # Allow VL to use up to 80% of host RAM for its in-process caches before
      # evicting. Higher than the default 60% is safe given the 5 g mem_limit cap.
      - "-memory.allowedPercent=80"
      # Reduce parallel readers per query (default = 2×CPU = 36 on 18-core host).
      # At c=100 with 36 readers each, that spawns 3600 goroutines fighting for
      # disk I/O — local SSD has <0.1ms latency so many readers add contention,
      # not parallelism. 8 readers × 100 concurrent = 800 goroutines, matching
      # 18 cores without scheduler thrash.
      - "-defaultParallelReaders=8"
      # Cap file-system concurrency (default 256 = 16×CPU, but 64 better fits 18 cores).
      - "-fs.maxConcurrency=64"
    volumes:
      - vl-data:/vlogs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # VictoriaMetrics Auth proxy in front of VictoriaLogs
  vmauth:
    image: ${VMAUTH_IMAGE:-victoriametrics/vmauth:v1.138.0}
    container_name: e2e-vmauth
    command:
      - "-auth.config=/etc/vmauth/auth.yml"
      - "-httpListenAddr=:8427"
    volumes:
      - ./vmauth.yml:/etc/vmauth/auth.yml:ro
    depends_on:
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8427/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # VictoriaMetrics TSDB for vmalert recording-rule remote write
  victoriametrics:
    image: ${VICTORIAMETRICS_IMAGE:-victoriametrics/victoria-metrics:v1.119.0}
    container_name: e2e-victoriametrics
    command:
      - "-storageDataPath=/vm-data"
      - "-httpListenAddr=:8428"
    volumes:
      - vm-data:/vm-data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # vmalert alert/rule backend against VictoriaLogs
  vmalert:
    image: ${VMALERT_IMAGE:-victoriametrics/vmalert:v1.138.0}
    container_name: e2e-vmalert
    working_dir: /rules
    ports:
      - "8880:8880"
    command:
      - "-httpListenAddr=:8880"
      - "-datasource.url=http://victorialogs:9428"
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-notifier.blackhole"
      - "-rule=compat.rules"
      - "-configCheckInterval=5s"
    volumes:
      - ./vmalert-rules.yml:/rules/compat.rules:ro
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8880/api/v1/rules?datasource_type=vlogs"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy (translating proxy under test)
  loki-vl-proxy:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy
    ports:
      - "3100:3100"
    volumes:
      - proxy-cache:/cache
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-values-indexed-cache=true"
      - "-label-values-hot-limit=200"
      - "-label-values-index-max-entries=50000"
      - "-label-values-index-persist-path=/cache/label-values-index.json"
      - "-label-values-index-persist-interval=5s"
      - "-label-values-index-startup-stale-threshold=30s"
      - "-label-values-index-startup-peer-warm-timeout=2s"
      # pprof for benchmark profiling (CPU/heap/alloc capture during bench runs).
      - "-server.enable-pprof"
      - "-server.admin-auth-token=bench-pprof-token"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with query-driven patterns autodetect enabled
  loki-vl-proxy-patterns-autodetect:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-patterns-autodetect
    ports:
      - "3110:3100"
    volumes:
      - proxy-patterns-cache:/cache
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-patterns-enabled=true"
      - "-patterns-autodetect-from-queries=true"
      - "-patterns-persist-path=/cache/patterns-snapshot.json"
      - "-patterns-persist-interval=5s"
      - "-patterns-startup-stale-threshold=30s"
      - "-patterns-startup-peer-warm-timeout=2s"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with backend routed through vmauth
  loki-vl-proxy-vmauth:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-vmauth
    ports:
      - "3109:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://vmauth:8427"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
    depends_on:
      vmauth:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with label-style=underscores (for OTel dot→underscore tests)
  loki-vl-proxy-underscore:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-underscore
    ports:
      - "3102:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=hybrid"
      - "-emit-structured-metadata=true"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with underscore labels but native metadata field mode
  loki-vl-proxy-native-metadata:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-native-metadata
    ports:
      - "3106:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=native"
      - "-emit-structured-metadata=true"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with underscore labels and translated-only metadata aliases
  loki-vl-proxy-translated-metadata:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-translated-metadata
    ports:
      - "3107:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with underscore labels and structured metadata disabled
  loki-vl-proxy-no-metadata:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-no-metadata
    ports:
      - "3108:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=info"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=false"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Loki-VL-proxy with synthetic tail and browser origin allowlist for real UI /tail tests
  loki-vl-proxy-tail:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-tail
    ports:
      - "3103:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=debug"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-tail.mode=synthetic"
      - "-tail.allowed-origins=http://grafana:3000,http://127.0.0.1:3002,http://localhost:3002"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  loki-vl-proxy-tail-native:
    image: ${PROXY_IMAGE:-loki-vl-proxy:e2e-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: e2e-proxy-tail-native
    ports:
      - "3105:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-ruler-backend=http://vmalert:8880"
      - "-alerts-backend=http://vmalert:8880"
      - "-log-level=debug"
      - "-cache-ttl=5s"
      - "-label-style=underscores"
      - "-tail.mode=native"
      - "-tail.allowed-origins=http://grafana:3000,http://127.0.0.1:3002,http://localhost:3002"
    depends_on:
      victorialogs:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  tail-ingress:
    image: nginx:1.27-alpine
    container_name: e2e-tail-ingress
    ports:
      - "3104:8080"
    volumes:
      - ./nginx-tail.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      loki-vl-proxy-tail:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # Continuous log generator — dual-writes realistic multi-service logs to Loki + VictoriaLogs.
  # Provides live data for Grafana Explore UI tests and Logs Drilldown pattern detection.
  log-generator:
    image: python:3.12-alpine
    container_name: e2e-log-generator
    profiles: ["ui"]
    command: python /scripts/log-generator.py
    volumes:
      - ./log-generator.py:/scripts/log-generator.py:ro
    environment:
      - LOKI_URL=http://loki:3100
      - VL_URL=http://victorialogs:9428
      - LOG_INTERVAL=10
      - LOG_BATCH=8
    depends_on:
      loki:
        condition: service_started
      victorialogs:
        condition: service_healthy
    restart: unless-stopped

  # Grafana with 3 datasources for manual side-by-side comparison
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    container_name: e2e-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_PLUGINS_PREINSTALL=victoriametrics-logs-datasource@0.26.3
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - loki
      - loki-vl-proxy
      - loki-vl-proxy-patterns-autodetect
      - loki-vl-proxy-vmauth
      - loki-vl-proxy-underscore
      - loki-vl-proxy-native-metadata
      - loki-vl-proxy-tail
      - loki-vl-proxy-tail-native
      - tail-ingress

volumes:
  vl-data:
  vm-data:
  proxy-cache:
  proxy-patterns-cache:
