scrape_configs:
  # Only scrape the proxy variant the bench actually drives traffic through
  # (PROXY_URL=http://localhost:13109 → e2e-proxy-vmauth → vmauth → VL).
  # The other proxy variants (e2e-proxy main, -underscore, -patterns-autodetect,
  # etc.) expose the same loki_vl_proxy_* metric names; scraping them too would
  # double-count traffic with no way to disambiguate by label inside the
  # process-emitted series. Keep just the bench-hit one labelled `component: proxy`
  # so dashboard panels showing component-grouped CPU/RSS/cache/latency reflect
  # exactly what's under test.
  - job_name: loki-vl-proxy-vmauth
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki-vl-proxy-vmauth:3100
        labels:
          component: proxy
  - job_name: vmauth
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - vmauth:8427
        labels:
          component: vmauth
  - job_name: loki
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
        labels:
          component: loki
  - job_name: victorialogs
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - victorialogs:9428
        labels:
          component: victorialogs
