scrape_configs:
  # vmauth-fronted variant — primary bench traffic target
  # (PROXY_URL=http://localhost:13109 → e2e-proxy-vmauth → vmauth → VL).
  # Other variants are scraped with distinct `instance` labels so cache tier
  # panels can disaggregate per-process L0/L1/L2/L3 series without double-counting.
  - job_name: loki-vl-proxy-vmauth
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki-vl-proxy-vmauth:3100
        labels:
          component: proxy
          instance: vmauth
  # Main e2e-proxy (L2 disk + L3 peer ring head). The bench script's
  # "L2 promotion across restart" and "L3 cross-peer" measurements hit this one.
  - job_name: loki-vl-proxy
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki-vl-proxy:3100
        labels:
          component: proxy
          instance: main
  # L3 peer #1 — second node in the static peer ring.
  - job_name: loki-vl-proxy-peer-a
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki-vl-proxy-peer-a:3100
        labels:
          component: proxy
          instance: peer-a
  # L3 peer #2 — third node in the static peer ring.
  - job_name: loki-vl-proxy-peer-b
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki-vl-proxy-peer-b:3100
        labels:
          component: proxy
          instance: peer-b
  - job_name: vmauth
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - vmauth:8427
        labels:
          component: vmauth
  - job_name: loki
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
        labels:
          component: loki
  - job_name: victorialogs
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    static_configs:
      - targets:
          - victorialogs:9428
        labels:
          component: victorialogs
