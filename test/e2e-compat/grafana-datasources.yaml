apiVersion: 1
datasources:
  # 1. Real Loki (ground truth reference)
  - name: Loki (direct)
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  # 2. VictoriaLogs via Loki-VL-proxy (under test)
  - name: Loki (via VL proxy)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-underscore:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  - name: Loki (via VL proxy multi-tenant)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-underscore:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0|fake"

  - name: Loki (via VL proxy native metadata)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-native-metadata:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  - name: Loki (via VL proxy live tail)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-tail:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  - name: Loki (via ingress tail)
    type: loki
    access: proxy
    url: http://tail-ingress:8080
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  - name: Loki (via VL proxy live tail native)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-tail-native:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  - name: Loki (via VL proxy patterns autodetect)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-patterns-autodetect:3100
    isDefault: true
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  - name: Loki (via VL proxy vmauth)
    type: loki
    access: proxy
    url: http://loki-vl-proxy-vmauth:3100
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
      maxLines: 1000
    secureJsonData:
      httpHeaderValue1: "0"

  # 3. VictoriaLogs native datasource (for direct comparison)
  - name: VictoriaLogs (direct)
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victorialogs:9428
    isDefault: false

  # 4. VictoriaMetrics — the e2e stack's metrics store. Scrapes proxy / vmauth /
  # loki / victorialogs /metrics every 5 s (see vm-scrape.yml). Use this
  # datasource for resource panels (CPU, RSS, goroutines, GC), per-endpoint
  # latency histograms (loki_vl_proxy_*_duration_seconds), cache hit rates,
  # and during-bench resource comparisons. Treated as a Prometheus datasource —
  # VM speaks PromQL natively.
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      timeInterval: 5s

