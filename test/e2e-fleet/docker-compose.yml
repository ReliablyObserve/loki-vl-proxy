version: "3.8"

# Fleet cache e2e test: 3 proxy instances with peer discovery + disk cache
# Usage:
#   docker compose up -d --build
#   go test -v -tags=e2e -timeout=120s ./test/e2e-fleet/

services:
  victorialogs:
    image: victoriametrics/victoria-logs:v1.49.0
    container_name: fleet-vl
    ports:
      - "9428:9428"
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=1d"
      - "-httpListenAddr=:9428"
    volumes:
      - vl-data:/vlogs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9428/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  proxy-a:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: fleet-proxy-a
    ports:
      - "3100:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-log-level=debug"
      - "-cache-ttl=30s"
      - "-cache-max=1000"
      - "-disk-cache-path=/cache/proxy-a.db"
      - "-disk-cache-compress=true"
      - "-disk-cache-flush-size=10"
      - "-disk-cache-flush-interval=1s"
      - "-peer-self=proxy-a:3100"
      - "-peer-discovery=static"
      - "-peer-static=proxy-a:3100,proxy-b:3100,proxy-c:3100"
    volumes:
      - cache-a:/cache
    depends_on:
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  proxy-b:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: fleet-proxy-b
    ports:
      - "3101:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-log-level=debug"
      - "-cache-ttl=30s"
      - "-cache-max=1000"
      - "-disk-cache-path=/cache/proxy-b.db"
      - "-disk-cache-compress=true"
      - "-disk-cache-flush-size=10"
      - "-disk-cache-flush-interval=1s"
      - "-peer-self=proxy-b:3100"
      - "-peer-discovery=static"
      - "-peer-static=proxy-a:3100,proxy-b:3100,proxy-c:3100"
    volumes:
      - cache-b:/cache
    depends_on:
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  proxy-c:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: fleet-proxy-c
    ports:
      - "3102:3100"
    command:
      - "-listen=:3100"
      - "-backend=http://victorialogs:9428"
      - "-log-level=debug"
      - "-cache-ttl=30s"
      - "-cache-max=1000"
      - "-disk-cache-path=/cache/proxy-c.db"
      - "-disk-cache-compress=true"
      - "-disk-cache-flush-size=10"
      - "-disk-cache-flush-interval=1s"
      - "-peer-self=proxy-c:3100"
      - "-peer-discovery=static"
      - "-peer-static=proxy-a:3100,proxy-b:3100,proxy-c:3100"
    volumes:
      - cache-c:/cache
    depends_on:
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  vl-data:
  cache-a:
  cache-b:
  cache-c:
